<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactivo de Animales</title>
    <link rel="stylesheet" href="prueba.css">
</head>
<body>

<div class="container">
    <!-- Mapa con áreas clicables -->
    <div class="mapa">
        <center><img src="Tenerife_Ubicaciones.jpg" usemap="#image-map" class="imagenTNRF"></center>
        <map name="image-map">
            <area class="animal-button" data-animal="tortuga-boba" coords="130,162,27" shape="circle">
            <area class="animal-button" data-animal="elefante" coords="406,234,26" shape="circle">
            <area class="animal-button" data-animal="leon" coords="360,365,25" shape="circle">
            <area class="animal-button" data-animal="cebra" coords="77,375,30" shape="circle">
        </map>
    </div>

    <!-- Contenedor de información del animal -->
    <div class="text-container">
        <h2 id="animal-title">Selecciona un animal</h2>
        <p id="animal-description">Haz clic sobre un animal en el mapa para ver más información.</p>
        <img id="animal-image" src="" alt="" width="250" height="200">
    </div>
</div>

<script src="prueba.js"></script>
</body>
</html>
